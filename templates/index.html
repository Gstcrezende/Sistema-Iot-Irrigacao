<!DOCTYPE html>
<html>
<head>
  <title>AgroTech IoT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      background: #020617;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    /* 🔥 Nova classe para alinhar o gráfico embaixo */
    .chart-container {
      padding: 0 20px 20px 20px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    .on { background: #22c55e; }
    .off { background: #ef4444; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .btn-on { background: #22c55e; }
    .btn-off { background: #ef4444; }

    select {
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      background: #334155;
      color: white;
      border: 1px solid #475569;
    }

    img {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🌱 AgroTech IoT Inteligente</header>

<div class="grid">
  <div class="card">
    <h3>Status</h3>
    <div id="status"></div>
  </div>

  <div class="card">
    <h3>Controle</h3>
    <select onchange="mudarCultura()" id="cultura">
      <option value="milho">🌽 Milho</option>
      <option value="soja">🌱 Soja</option>
      <option value="cafe">☕ Café</option>
    </select>
    <br><br>
    <button class="btn-on" onclick="ligar()">Ligar</button>
    <button class="btn-off" onclick="desligar()">Desligar</button>
  </div>

  <div class="card">
    <h3>Clima da Cidade</h3>
    <div id="clima"></div>
  </div>
</div>

<div class="chart-container">
  <div class="card">
    <h3>Gráfico Histórico - Solo (%)</h3>
    <canvas id="grafico" height="60"></canvas>
  </div>
</div>

<script>
let chart;
let ultimaAtualizacaoGrafico = 0; // Controle de tempo para o gráfico

function initChart() {
  const ctx = document.getElementById("grafico");

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Umidade Solo (%)',
        data: [],
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.2)',
        borderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      scales: {
        y: {
          min: 0, // 🔥 Garante que o eixo Y nunca tenha números negativos
          max: 100 // Opcional: Garante que o limite seja sempre 100%
        }
      }
    }
  });
}

async function atualizar() {
  const res = await fetch('/dados');
  const d = await res.json();

  const tempCidade = Math.round(d.temp_cidade);

  // Atualiza os textos da tela em tempo real (a cada 3s)
  document.getElementById("status").innerHTML = `
    🌱 Cultura: ${d.cultura.charAt(0).toUpperCase() + d.cultura.slice(1)}<br>
    💧 Solo: ${Math.round(d.solo)}%<br>
    🌡️ Temp Sensor: ${Math.round(d.temp)}°C<br>
    🚿 Irrigação: 
    <span class="badge ${d.irrigacao === 'ON' ? 'on' : 'off'}">
      ${d.irrigacao}
    </span>
  `;

  document.getElementById("clima").innerHTML = `
    📍 ${d.cidade}<br>
    🌡️ ${tempCidade}°C<br>
    🌧️ ${d.chuva ? "Chovendo" : "Sem chuva"}<br>
    <img src="https://openweathermap.org/img/wn/${d.icone}@2x.png">
  `;

  // 🔥 Verifica se já passaram 20 minutos (1.200.000 milissegundos) para atualizar o gráfico
  const agora = Date.now();
  if (agora - ultimaAtualizacaoGrafico >= 1200000 || ultimaAtualizacaoGrafico === 0) {
    const time = new Date().toLocaleTimeString();

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(d.solo);

    if (chart.data.labels.length > 15) {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }

    chart.update();
    ultimaAtualizacaoGrafico = agora;
  }
}

async function mudarCultura() {
  const cultura = document.getElementById("cultura").value;
  await fetch('/cultura', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({cultura})
  });
}

async function ligar() { await fetch('/ligar'); }
async function desligar() { await fetch('/desligar'); }

initChart();

// Busca os dados em tempo real a cada 3 segundos (mas o gráfico agora tem trava interna)
setInterval(atualizar, 3000);
</script>

</body>
</html>
