<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroTech IoT - Painel de Controle</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: #334155;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
    }

    .navbar {
      background: #020617;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .navbar h1 { margin: 0; font-size: 1.5rem; color: var(--success); }

    .container {
      padding: 2rem;
      max-width: 1200px;
      margin: auto;
    }

    /* Weather Widget */
    .weather-widget {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--card-bg);
      padding: 1rem 2rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .weather-widget img { width: 60px; height: 60px; }
    .weather-info h3 { margin: 0; font-size: 1.2rem; }
    .weather-info p { margin: 0.2rem 0; color: var(--text-muted); }

    /* Header Actions */
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    /* Buttons */
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary { background: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
    .btn-outline:hover { background: var(--border); }

    /* Grid & Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }

    .card-title { font-size: 1.25rem; font-weight: 600; margin: 0; }
    .card-subtitle { font-size: 0.85rem; color: var(--text-muted); display: block; margin-top: 0.2rem; }

    .badge {
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .badge.on { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .badge.off { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .badge.auto { background: rgba(59, 130, 246, 0.2); color: var(--primary); }

    .stat-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .stat-label { color: var(--text-muted); }

    .controls-group {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    select, input {
      padding: 0.75rem;
      border-radius: 0.5rem;
      background: #0f172a;
      border: 1px solid var(--border);
      color: white;
      width: 100%;
      box-sizing: border-box;
    }

    .button-group { display: flex; gap: 0.5rem; }
    .button-group .btn { flex: 1; justify-content: center; }

    .card-footer {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 1rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
    }
    
    .modal.large { max-width: 800px; }

    .modal h2 { margin-top: 0; margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      background: var(--card-bg);
      border-radius: 1rem;
      border: 1px dashed var(--border);
    }
  </style>
</head>
<body>

<div class="navbar">
  <h1>🌱 AgroTech IoT</h1>
  <div id="relogio" style="color: var(--text-muted);">--:--</div>
</div>

<div class="container">
  <!-- Weather Widget -->
  <div class="weather-widget" id="weather-widget">
    <div style="color: var(--text-muted);">Buscando informações de clima...</div>
  </div>

  <!-- Actions -->
  <div class="header-actions">
    <h2>Áreas de Controle</h2>
    <button class="btn btn-primary" onclick="abrirModalAdd()">
      ➕ Adicionar Área
    </button>
  </div>

  <!-- Grid de Dispositivos -->
  <div class="grid" id="grid-dispositivos">
    <div class="empty-state">Carregando áreas...</div>
  </div>
</div>

<!-- Modal Adicionar Dispositivo -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h2>Adicionar Nova Área</h2>
    <div class="form-group">
      <label>ID do Dispositivo (Ex: sensor_02)</label>
      <input type="text" id="add-id" placeholder="Identificador único no MQTT">
    </div>
    <div class="form-group">
      <label>Nome da Área</label>
      <input type="text" id="add-nome" placeholder="Ex: Estufa Norte">
    </div>
    <div class="form-group">
      <label>Cultura Padrão</label>
      <select id="add-cultura">
        <option value="milho">🌽 Milho</option>
        <option value="soja">🌱 Soja</option>
        <option value="cafe">☕ Café</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="fecharModalAdd()">Cancelar</button>
      <button class="btn btn-success" onclick="salvarDispositivo()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Gráfico Histórico -->
<div class="modal-overlay" id="modal-grafico">
  <div class="modal large">
    <h2 id="titulo-grafico">Histórico de Umidade</h2>
    <canvas id="graficoCanvas" height="100"></canvas>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="fecharModalGrafico()">Fechar</button>
    </div>
  </div>
</div>

<script>
let chartInstance = null;

// Loop principal de atualização
async function atualizarDados() {
  try {
    const res = await fetch('/api/estado');
    const data = await res.json();
    renderClima(data.clima);
    renderDispositivos(data.dispositivos);
  } catch (e) {
    console.error("Erro ao buscar estado:", e);
  }
}

function renderClima(clima) {
  const widget = document.getElementById("weather-widget");
  if (!clima || clima.cidade === "-") return;

  const temp = Math.round(clima.temp_cidade);
  const icone = `https://openweathermap.org/img/wn/${clima.icone}@2x.png`;
  
  widget.innerHTML = `
    <img src="${icone}" alt="Clima">
    <div class="weather-info">
      <h3>${clima.cidade} - ${temp}°C</h3>
      <p>
        ${clima.chuva ? "🌧️ Chovendo agora" : "☀️ Sem chuva agora"} | 
        Previsão (12h): ${clima.previsao_chuva ? "Chuva" : "Limpo"} (${clima.prob_chuva}% chance)
      </p>
    </div>
  `;
}

function renderDispositivos(dispositivos) {
  const grid = document.getElementById("grid-dispositivos");
  
  if (dispositivos.length === 0) {
    grid.innerHTML = `<div class="empty-state">Nenhuma área cadastrada. Clique em "Adicionar Área" para começar.</div>`;
    return;
  }

  let html = "";
  dispositivos.forEach(d => {
    const badgeBomba = d.irrigacao === 'ON' ? 'on' : 'off';
    const txtBomba = d.irrigacao === 'ON' ? 'Bomba LIGADA' : 'Bomba Desligada';
    
    html += `
      <div class="card">
        <div class="card-header">
          <div>
            <h3 class="card-title">${d.nome}</h3>
            <span class="card-subtitle">ID: ${d.id}</span>
          </div>
          <span class="badge ${badgeBomba}">${txtBomba}</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">💧 Umidade do Solo:</span>
          <strong>${Math.round(d.solo)}%</strong>
        </div>
        <div class="stat-row">
          <span class="stat-label">🌡️ Temp. Sensor:</span>
          <strong>${Math.round(d.temp)}°C</strong>
        </div>
        <div class="stat-row">
          <span class="stat-label">⚙️ Modo Atual:</span>
          <span class="badge ${d.modo_controle === 'AUTO' ? 'auto' : (d.modo_controle === 'ON' ? 'on' : 'off')}">
            ${d.modo_controle}
          </span>
        </div>

        <div class="controls-group">
          <select onchange="alterarCultura('${d.id}', this.value)">
            <option value="milho" ${d.cultura === 'milho' ? 'selected' : ''}>🌽 Cultura: Milho</option>
            <option value="soja" ${d.cultura === 'soja' ? 'selected' : ''}>🌱 Cultura: Soja</option>
            <option value="cafe" ${d.cultura === 'cafe' ? 'selected' : ''}>☕ Cultura: Café</option>
          </select>
          
          <div class="button-group">
            <button class="btn ${d.modo_controle === 'AUTO' ? 'btn-primary' : 'btn-outline'}" onclick="alterarModo('${d.id}', 'AUTO')">Auto</button>
            <button class="btn ${d.modo_controle === 'ON' ? 'btn-success' : 'btn-outline'}" onclick="alterarModo('${d.id}', 'ON')">Ligar</button>
            <button class="btn ${d.modo_controle === 'OFF' ? 'btn-danger' : 'btn-outline'}" onclick="alterarModo('${d.id}', 'OFF')">Desligar</button>
          </div>
        </div>

        <div class="card-footer">
          <button class="btn btn-outline" onclick="abrirModalGrafico('${d.id}', '${d.nome}')">📈 Histórico</button>
          <button class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="removerDispositivo('${d.id}')">🗑️</button>
        </div>
      </div>
    `;
  });

  grid.innerHTML = html;
}

// Ações na API
async function alterarCultura(id, cultura) {
  await fetch(`/api/dispositivo/${id}/config`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ cultura })
  });
  atualizarDados();
}

async function alterarModo(id, modo) {
  await fetch(`/api/dispositivo/${id}/config`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ modo })
  });
  atualizarDados();
}

async function removerDispositivo(id) {
  if (confirm(`Tem certeza que deseja remover a área ${id}?`)) {
    await fetch(`/api/dispositivo/${id}`, { method: 'DELETE' });
    atualizarDados();
  }
}

// Modal Adicionar
function abrirModalAdd() {
  document.getElementById('add-id').value = '';
  document.getElementById('add-nome').value = '';
  document.getElementById('modal-add').classList.add('active');
}

function fecharModalAdd() {
  document.getElementById('modal-add').classList.remove('active');
}

async function salvarDispositivo() {
  const id = document.getElementById('add-id').value.trim();
  const nome = document.getElementById('add-nome').value.trim();
  const cultura = document.getElementById('add-cultura').value;

  if (!id || !nome) {
    alert("Preencha ID e Nome."); return;
  }

  await fetch('/api/dispositivo', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id, nome, cultura })
  });

  fecharModalAdd();
  atualizarDados();
}

// Modal Gráfico
async function abrirModalGrafico(id, nome) {
  document.getElementById('titulo-grafico').innerText = `Histórico - ${nome}`;
  document.getElementById('modal-grafico').classList.add('active');
  
  const res = await fetch(`/api/historico/${id}`);
  const h = await res.json();
  
  renderizarGrafico(h.labels, h.data, h.status);
}

function fecharModalGrafico() {
  document.getElementById('modal-grafico').classList.remove('active');
  if (chartInstance) {
    chartInstance.destroy();
    chartInstance = null;
  }
}

function getCorPonto(status) { return status === 'ON' ? '#22c55e' : '#3b82f6'; }
function getTamanhoPonto(status) { return status === 'ON' ? 6 : 3; }

function renderizarGrafico(labels, data, statusList) {
  const ctx = document.getElementById("graficoCanvas");
  
  if (chartInstance) { chartInstance.destroy(); }

  const cores = statusList.map(s => getCorPonto(s));
  const tamanhos = statusList.map(s => getTamanhoPonto(s));

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Umidade Solo (%)',
        data: data,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointBackgroundColor: cores, 
        pointBorderColor: cores,
        pointRadius: tamanhos, 
        pointHoverRadius: 8
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { min: 0, max: 100 }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

// Relógio no topo
setInterval(() => {
  document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
}, 1000);

// Init
atualizarDados();
setInterval(atualizarDados, 3000); // Atualiza a tela a cada 3 segundos
</script>

</body>
</html>
