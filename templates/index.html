<!DOCTYPE html>
<html>
<head>
  <title>AgroTech IoT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      background: #020617;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    .chart-container {
      padding: 0 20px 20px 20px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    .on { background: #22c55e; }
    .off { background: #ef4444; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .btn-on { background: #22c55e; }
    .btn-off { background: #ef4444; }

    select {
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      background: #334155;
      color: white;
      border: 1px solid #475569;
    }

    img {
      margin-top: 10px;
    }

    .legenda-grafico {
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
      color: #94a3b8;
    }
    .ponto-azul { color: #3b82f6; font-weight: bold; }
    .ponto-verde { color: #22c55e; font-weight: bold; }
  </style>
</head>

<body>

<header>🌱 AgroTech IoT Inteligente</header>

<div class="grid">
  <div class="card">
    <h3>Status</h3>
    <div id="status">Carregando dados...</div>
  </div>

  <div class="card">
    <h3>Controle</h3>
    <select onchange="mudarCultura()" id="cultura">
      <option value="milho">🌽 Milho</option>
      <option value="soja">🌱 Soja</option>
      <option value="cafe">☕ Café</option>
    </select>
    <br><br>
    <button class="btn-on" onclick="ligar()">Ligar</button>
    <button class="btn-off" onclick="desligar()">Desligar</button>
  </div>

  <div class="card">
    <h3>Clima e Previsão (Inteligência)</h3>
    <div id="clima">Buscando clima...</div>
  </div>
</div>

<div class="chart-container">
  <div class="card">
    <h3>Gráfico Histórico (Últimas 5 horas) - Solo (%)</h3>
    <div class="legenda-grafico">
      <span class="ponto-azul">●</span> Bomba Desligada &nbsp;&nbsp;&nbsp; 
      <span class="ponto-verde">●</span> Bomba Ligada (Irrigando)
    </div>
    <canvas id="grafico" height="60"></canvas>
  </div>
</div>

<script>
let chart;
let ultimaAtualizacaoGrafico = 0; 

// 🔥 Funções auxiliares para definir as cores e tamanhos dos pontos dinamicamente
function getCorPonto(status) {
  return status === 'ON' ? '#22c55e' : '#3b82f6'; // Verde se ligado, Azul se desligado
}

function getTamanhoPonto(status) {
  return status === 'ON' ? 6 : 2; // Ponto grande se ligado, pequeno se desligado
}

function initChart() {
  const ctx = document.getElementById("grafico");

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Umidade Solo (%)',
        data: [],
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59, 130, 246, 0.2)',
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        // 🔥 Agora as cores e tamanhos são Arrays que serão preenchidos individualmente
        pointBackgroundColor: [], 
        pointBorderColor: [],
        pointRadius: [], 
        pointHoverRadius: 8
      }]
    },
    options: {
      scales: {
        y: {
          min: 0, 
          max: 100 
        }
      }
    }
  });
}

async function carregarHistorico() {
  try {
    const res = await fetch('/historico');
    const h = await res.json();
    
    if (h.labels.length > 0) {
      chart.data.labels = h.labels;
      chart.data.datasets[0].data = h.data;

      // 🔥 Mapeia o histórico do banco para transformar "ON/OFF" em cores e tamanhos
      const cores = h.status.map(s => getCorPonto(s));
      const tamanhos = h.status.map(s => getTamanhoPonto(s));

      chart.data.datasets[0].pointBackgroundColor = cores;
      chart.data.datasets[0].pointBorderColor = cores;
      chart.data.datasets[0].pointRadius = tamanhos;

      chart.update();
      ultimaAtualizacaoGrafico = Date.now(); 
    }
  } catch (erro) {
    console.log("Sem histórico ou erro ao carregar.");
  }
}

async function atualizar() {
  const res = await fetch('/dados');
  const d = await res.json();

  const tempCidade = Math.round(d.temp_cidade);

  // Atualiza os textos da tela em tempo real
  document.getElementById("status").innerHTML = `
    🌱 Cultura: ${d.cultura.charAt(0).toUpperCase() + d.cultura.slice(1)}<br>
    💧 Solo: ${Math.round(d.solo)}%<br>
    🌡️ Temp Sensor: ${Math.round(d.temp)}°C<br>
    🚿 Irrigação: 
    <span class="badge ${d.irrigacao === 'ON' ? 'on' : 'off'}">
      ${d.irrigacao}
    </span>
  `;

  if (d.cidade !== "-") {
    // 🔥 Tela de clima atualizada com a previsão preditiva
    document.getElementById("clima").innerHTML = `
      📍 ${d.cidade}<br>
      🌡️ ${tempCidade}°C<br>
      🌧️ Agora: <b>${d.chuva ? "Chovendo" : "Sem chuva"}</b><br>
      🔮 Previsão (12h): <b>${d.previsao_chuva ? "Chuva ☔" : "Limpo ☀️"} (${d.prob_chuva}%)</b><br>
      <img src="https://openweathermap.org/img/wn/${d.icone}@2x.png" style="margin-top:-10px;">
    `;
  }

  // Verifica se já passaram 5 minutos para atualizar o gráfico localmente
  const agora = Date.now();
  if (agora - ultimaAtualizacaoGrafico >= 300000 || ultimaAtualizacaoGrafico === 0) {
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(d.solo);

    // 🔥 Adiciona a cor e tamanho específicos baseados no status da bomba neste exato momento
    const cor = getCorPonto(d.irrigacao);
    const tamanho = getTamanhoPonto(d.irrigacao);

    chart.data.datasets[0].pointBackgroundColor.push(cor);
    chart.data.datasets[0].pointBorderColor.push(cor);
    chart.data.datasets[0].pointRadius.push(tamanho);

    // Limite de 60 pontos
    if (chart.data.labels.length > 60) {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
      // 🔥 Se removermos o primeiro dado, precisamos remover a primeira cor e tamanho também
      chart.data.datasets[0].pointBackgroundColor.shift();
      chart.data.datasets[0].pointBorderColor.shift();
      chart.data.datasets[0].pointRadius.shift();
    }

    chart.update();
    ultimaAtualizacaoGrafico = agora;
  }
}

async function mudarCultura() {
  const cultura = document.getElementById("cultura").value;
  await fetch('/cultura', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({cultura})
  });
}

async function ligar() { await fetch('/ligar'); }
async function desligar() { await fetch('/desligar'); }

// --- Ordem de Inicialização ---
initChart();
carregarHistorico(); 
atualizar(); 
setInterval(atualizar, 3000);
</script>

</body>
</html>
