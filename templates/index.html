<!DOCTYPE html>
<html>
<head>
  <title>AgroTech IoT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background:#0f172a; color:white; font-family:Arial; }
    .card { background:#1e293b; padding:20px; margin:10px; border-radius:10px; }
  </style>
</head>

<body>

<h2>🌱 AgroTech IoT</h2>

<div class="card" id="status"></div>
<div class="card" id="clima"></div>

<script>
async function atualizar(){
  const r = await fetch('/dados');
  const d = await r.json();

  document.getElementById("status").innerHTML = `
    Solo: ${d.solo}%<br>
    Irrigação: ${d.irrigacao}
  `;

  document.getElementById("clima").innerHTML = `
    📍 ${d.cidade}<br>
    🌡️ ${d.temp_cidade}°C<br>
    🌧️ ${d.chuva}<br>
    📌 ${d.lat}, ${d.lon}<br>
    <img src="https://openweathermap.org/img/wn/${d.icone}@2x.png">
  `;
}

setInterval(atualizar, 3000);
</script>

</body>
</html>
