<!DOCTYPE html>
<html>
<head>
  <title>AgroTech IoT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    select {
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>🌱 AgroTech IoT Dashboard</h1>

<div class="card">
  <h3>Status</h3>
  <p id="status"></p>
</div>

<div class="card">
  <h3>Controle</h3>
  <select onchange="mudarCultura(this.value)">
    <option value="milho">Milho</option>
    <option value="soja">Soja</option>
    <option value="cafe">Café</option>
  </select><br>

  <button onclick="ligar()">Ligar</button>
  <button onclick="desligar()">Desligar</button>
</div>

<div class="card">
  <h3>Gráfico Solo</h3>
  <canvas id="grafico"></canvas>
</div>

<script>
let chart;
let dataPoints = [];

function initChart() {
  const ctx = document.getElementById("grafico").getContext("2d");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: "Umidade do Solo (%)",
        data: [],
        borderWidth: 2
      }]
    }
  });
}

async function atualizar() {
  const res = await fetch('/dados');
  const d = await res.json();

  document.getElementById("status").innerText =
    `Solo: ${d.solo}% | Temp: ${d.temp}°C | Chuva: ${d.chuva} | Irrigação: ${d.irrigacao}`;

  const time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(d.solo);

  if (chart.data.labels.length > 10) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

async function mudarCultura(c) {
  await fetch('/cultura', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({cultura: c})
  });
}

async function ligar() { await fetch('/ligar'); }
async function desligar() { await fetch('/desligar'); }

initChart();
setInterval(atualizar, 3000);
</script>

</body>
</html>
